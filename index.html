<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEYROS | زینب رستمی</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Vazirmatn', sans-serif;
    background: #fff;
    color: #111;
}

/* هدر */
header {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid #eee;
}

.logo {
    font-size: 24px;
    font-weight: bold;
    letter-spacing: 2px;
}

.menu {
    cursor: pointer;
}

/* هیرو */
.hero {
    height: 90vh;
    background: url('https://images.unsplash.com/photo-1521334884684-d80222895322') center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
}

.hero h1 {
    font-size: 50px;
    background: rgba(0,0,0,0.4);
    padding: 20px;
}

/* دسته بندی */
.categories {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap: 20px;
    padding: 50px;
}

.cat {
    height: 200px;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    transition: 0.3s;
    cursor: pointer;
}

.cat:hover {
    transform: translateY(-10px);
    background: #000;
    color: #fff;
}

/* محصولات */
.products {
    padding: 50px;
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 30px;
}

.card {
    border: 1px solid #eee;
    padding: 10px;
    transition: 0.3s;
}

.card img {
    width: 100%;
}

.card:hover {
    transform: scale(1.03);
}

/* فوتر */
footer {
    padding: 40px;
    background: #111;
    color: white;
    text-align: center;
}

.btn {
    padding: 10px 20px;
    border: none;
    background: black;
    color: white;
    cursor: pointer;
}

.btn:hover {
    background: #444;
}
</style>

</head>

<body>

<header>
<div class="logo">ZEYROS</div>
<div class="menu">☰</div>
</header>

<section class="hero">
<h1>طراحی هویت، نه فقط لباس</h1>
</section>

<section class="categories">
<div class="cat">مانتو</div>
<div class="cat">کت شلوار</div>
<div class="cat">شومیز</div>
<div class="cat">پالتو</div>
</section>

<section class="products">
<h2>محصولات ویژه</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
<p>لباس طراحی خاص</p>
<button class="btn">خرید</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1495121605193-b116b5b09a27">
<p>استایل لوکس</p>
<button class="btn">خرید</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
<p>طراحی اختصاصی</p>
<button class="btn">خرید</button>
</div>

</div>
</section>

<footer>
<p>Instagram: zeyros_design</p>
<p>📞 +989117745093</p>
<p>پرداخت کارت: 1234 5678 9876 5432</p>
</footer>

</body>
</html>
