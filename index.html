<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEYROS | زینب رستمی</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Vazirmatn',sans-serif;
background:#fff;
color:#111;
}

/* هدر */
header{
display:flex;
justify-content:space-between;
padding:20px 40px;
position:fixed;
width:100%;
background:white;
z-index:1000;
border-bottom:1px solid #eee;
}

.logo{
font-size:22px;
font-weight:bold;
letter-spacing:2px;
}

/* هیرو */
.hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?auto=format&fit=crop&w=1500&q=80') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
}

.hero h1{
color:white;
font-size:48px;
background:rgba(0,0,0,0.4);
padding:20px;
}

/* دسته بندی */
.categories{
display:flex;
justify-content:center;
gap:20px;
padding:80px 20px 40px;
margin-top:60px;
flex-wrap:wrap;
}

.cat{
padding:30px 40px;
border:1px solid #ddd;
cursor:pointer;
transition:0.3s;
}

.cat:hover{
background:black;
color:white;
transform:translateY(-5px);
}

/* محصولات */
.products{
padding:50px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
overflow:hidden;
border:1px solid #eee;
padding-bottom:15px;
}

.card img{
width:100%;
height:350px;
object-fit:cover;
transition:0.4s;
}

.card:hover img{
transform:scale(1.1);
}

.card p{
margin:15px 0;
}

.btn{
background:black;
color:white;
padding:10px 20px;
border:none;
cursor:pointer;
}

.btn:hover{
background:#444;
}

/* فوتر */
footer{
background:black;
color:white;
text-align:center;
padding:40px;
margin-top:50px;
}

</style>
</head>

<body>

<header>
<div class="logo">ZEYROS</div>
<div>☰</div>
</header>

<section class="hero">
<h1>طراحی هویت، نه فقط لباس</h1>
</section>

<section class="categories">
<div class="cat">مانتو</div>
<div class="cat">کت شلوار</div>
<div class="cat">شومیز</div>
<div class="cat">پالتو</div>
</section>

<section class="products">
<h2>محصولات ویژه</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b?auto=format&fit=crop&w=800&q=80">
<p>لباس طراحی خاص</p>
<button class="btn">خرید</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1521334884684-d80222895322?auto=format&fit=crop&w=800&q=80">
<p>استایل لوکس</p>
<button class="btn">خرید</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1509631179647-0177331693ae?auto=format&fit=crop&w=800&q=80">
<p>طراحی اختصاصی</p>
<button class="btn">خرید</button>
</div>

</div>
</section>

<footer>
<p>Instagram: zeyros_design</p>
<p>📞 +989117745093</p>
<p>💳 کارت: 1234 5678 9876 5432</p>
</footer>

</body>
</html>
